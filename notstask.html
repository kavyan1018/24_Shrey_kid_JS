<script>

    // user input
    let amount = parseInt(prompt("Enter the Number :"))

    let n500 = 0, n200 = 0, n100 = 0, n50 = 0, n20 = 0, n10 = 0, n5 = 0, n2 = 0, n1 = 0;

    if (amount >= 500) {

        n500 = Math.floor(amount / 500);   // Math.floor -> removes the decimal part given the whole Number; 
        amount = amount % 500;  // remaning value   
    }

    if (amount >= 200) {
        n200 = Math.floor(amount / 200);
        amount = amount % 200;
    }

    if (amount >= 100) {
        n100 = Math.floor(amount / 100);
        amount = amount % 100;
    }

    if (amount >= 50) {
        n50 = Math.floor(amount / 50);
        amount = amount % 50;
    }
    if (amount >= 20) {
        n20 = Math.floor(amount / 20);
        amount = amount % 20;
    }
    if (amount >= 10) {
        n10 = Math.floor(amount / 10);
        amount = amount % 10;
    }
    if (amount >= 5) {
        n5 = Math.floor(amount / 5);
        amount = amount % 5;
    }
    if (amount >= 2) {
        n2 = Math.floor(amount / 2);
        amount = amount % 2;
    }
    if (amount >= 1) {
        n1 = Math.floor(amount / 1);
        amount = amount % 1;
    }

    console.log("500 - " + n500);
    console.log("200 - " + n200);
    console.log("100 - " + n100);
    console.log("50 - " + n50);
    console.log("20 - " + n20);
    console.log("10 - " + n10);
    console.log("5 - " + n5);
    console.log("2 - " + n2);
    console.log("1 - " + n1);
</script>
</html>
